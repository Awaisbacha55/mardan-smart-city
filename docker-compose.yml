version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: mardan-postgres
    restart: always
    environment:
      POSTGRES_DB: mardan_smart_city
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: mardan_password_123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
