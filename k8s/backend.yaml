apiVersion: apps/v1
kind: Deployment
metadata:
  name: mardan-backend
  labels:
    app: mardan-backend
spec:
  replicas: 3 # Auto-scaling load balancing for high traffic
  selector:
    matchLabels:
      app: mardan-backend
  template:
    metadata:
      labels:
        app: mardan-backend
    spec:
      containers:
        - name: mardan-backend
          image: your-dockerhub-user/mardan-backend:latest
          ports:
            - containerPort: 5000
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "5000"
            - name: DB_HOST
              value: "postgres-service"
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              value: "mardan_smart_city"
            - name: DB_USER
              value: "postgres"
            - name: DB_PASSWORD
              value: "mardan_password_123"
            - name: JWT_SECRET
              value: "mardan_smart_city_super_secret_jwt_key_2024"
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  labels:
    app: mardan-backend
spec:
  type: LoadBalancer # Expose to external traffic (can be ClusterIP if using Ingress)
  ports:
    - port: 5000
      targetPort: 5000
  selector:
    app: mardan-backend
