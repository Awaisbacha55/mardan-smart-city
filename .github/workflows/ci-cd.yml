name: Cloud-Native Deployment Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login to Amazon ECR (or Docker Hub)
        # Using DockerHub as a generic registry example for this proposal
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & Push Backend Docker Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/mardan-backend:latest ./backend
          docker push ${{ secrets.DOCKER_USERNAME }}/mardan-backend:latest

      - name: Build & Push Frontend Docker Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/mardan-frontend:latest ./frontend
          docker push ${{ secrets.DOCKER_USERNAME }}/mardan-frontend:latest

      - name: Update Kubernetes Kubeconfig
        run: aws eks update-kubeconfig --name mardan-cluster --region us-east-1

      - name: Apply Kubernetes Manifests (Zero-Downtime Rollout)
        run: |
          kubectl apply -f k8s/postgres.yaml
          kubectl apply -f k8s/backend.yaml
          kubectl apply -f k8s/frontend.yaml
          
          # Force deployment restart to pull newest images
          kubectl rollout restart deployment mardan-backend
          kubectl rollout restart deployment mardan-frontend
