apiVersion: apps/v1
kind: Deployment
metadata:
  name: mardan-frontend
  namespace: mardan-city
  labels:
    app: mardan-frontend
    tier: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: mardan-frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: mardan-frontend
        tier: frontend
    spec:
      containers:
        - name: frontend
          image: awaisbacha55/mardan-frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
              protocol: TCP
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 30
