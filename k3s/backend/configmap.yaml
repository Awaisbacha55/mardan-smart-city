apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: mardan-city
  labels:
    app: mardan-backend
data:
  NODE_ENV: "production"
  PORT: "5000"
  DB_HOST: "postgres-service"
  DB_PORT: "5432"
  DB_NAME: "mardan_smart_city"
  DB_USER: "postgres"
  REDIS_URL: "redis://redis-service:6379"
  CLIENT_URL: "http://frontend-service"
  JWT_EXPIRE: "7d"
